[alembic]
# Path to migration scripts — relative to this file's parent directory
script_location = alembic

# Template for migration revision IDs
# file_template = %%(rev)s_%%(slug)s

# sys.path additions (so "app" is importable)
prepend_sys_path = .

# timezone for revision timestamps
# timezone =

# The sqlalchemy.url is set programmatically in env.py — DO NOT set it here.
# sqlalchemy.url =

[post_write_hooks]
# Run ruff to auto-format new migration files
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
